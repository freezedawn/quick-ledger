  <main class="app">
    <header class="top">
      <div class="brand"><h1>快记账</h1><p>本地保存，账户可配，支持转账、欠款、标注和 CSV 导出。</p></div>
      <div class="today"><div class="mini"><span>今日收入</span><b id="todayIncome">0.00</b></div><div class="mini"><span>今日支出</span><b id="todayExpense">0.00</b></div><div class="mini"><span>本月净额</span><b id="monthNet">0.00</b></div></div>

    <div class="status" id="storageStatus"></div>
    <div class="workspace">
      <section class="panel composer active" aria-label="快速记账">

          <div class="preview" id="preview"></div>
          <div class="chips" id="quickAccounts"></div>
          <div class="chips" id="quickCategories"></div>
          <button class="save" type="submit">保存这一笔</button>
          <div class="status" id="status">输入后会实时解析。</div>
        </form>

          <textarea id="ocrText" autocomplete="off" inputmode="text" placeholder="&#x53EF;&#x7C98;&#x8D34;&#x624B;&#x673A; OCR &#x6587;&#x5B57;&#xFF0C;&#x4E5F;&#x53EF;&#x7C98;&#x8D34;&#x624B;&#x673A; AI &#x6309;&#x6A21;&#x677F;&#x6574;&#x7406;&#x51FA;&#x7684; JSON&#x3002;"></textarea>

          <div class="ocr-list" id="ocrList"></div>

      <section class="screen hidden">

          <div id="statsTable"></div>

          <div class="list" id="debtList"></div>
        </section>
      </section>
    </div>
  </main>

      <div class="grid2 edit-normal" id="editNormal"><label>账户<select id="editAccount"></select></label><label>分类<select id="editCategory"></select></label></div>
      <div class="grid2 edit-transfer" id="editTransfer"><label>转出账户<select id="editFrom"></select></label><label>转入账户<select id="editTo"></select></label></div>
      <label>备注<input id="editNote"></label>
      <div class="footer-actions"><button class="secondary" value="cancel" type="submit">取消</button><button class="primary" id="saveEdit" value="default" type="button">保存修改</button></div>
    </form>
  </dialog>

  <style>

{min-width:0}.entry-main b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px}.entry-main span{display:block;margin-top:4px;color:var(--muted);font-size:12px}.entry-actions{display:flex;gap:6px;align-items:center}.amount{text-align:right;font-weight:850;font-size:17px}.income{color:var(--accent)}.expense{color:var(--warn)}.transfer{color:var(--accent2)}.iconbtn{min-width:36px;min-height:34px;border:1px solid var(--line);border-radius:8px;background:var(--paper2)}.danger{color:var(--warn)}.empty{padding:22px 12px;border:1px dashed #c9bdab;border-radius:8px;background:rgba(255,250,241,.55);color:var(--muted);text-align:center}.table{width:100%;border-collapse:collapse;background:var(--paper2);border:1px solid var(--line);border-radius:8px;overflow:hidden}.table th,.table td{padding:10px 8px;border-bottom:1px solid var(--line);text-align:right;font-size:13px}.table th:first-child,.table td:first-child{text-align:left}.table tr:last-child td{border-bottom:0}.account-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px}.account-card{border:1px solid var(--line);background:var(--paper2);border-radius:8px;padding:11px;display:flex;justify-content:space-between;gap:8px;align-items:center}.account-card b{display:block}.account-card span{display:block;margin-top:3px;color:var(--muted);font-size:12px}.account-form{display:grid;grid-template-columns:1fr 110px auto;gap:8px;margin:10px 0 14px}dialog{width:min(520px,calc(100% - 22px));border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink);box-shadow:0 22px 80px rgba(0,0,0,.25);padding:0}dialog::backdrop{background:rgba(32,29,24,.35)}.dialog-body{padding:14px}.dialog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.edit-transfer{display:none}.edit-transfer.show{display:grid}.edit-normal.hide{display:none}.footer-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}.secondary{min-height:40px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper2)}.primary{min-height:40px;padding:0 14px;border-radius:8px;background:var(--accent);color:#fff;font-weight:750}@media(max-width:860px){.top{display:block}.today{margin-top:10px}.workspace{grid-template-columns:1fr}.composer{position:static}.filters{grid-template-columns:1fr 1fr}.summary{grid-template-columns:repeat(2,minmax(0,1fr))}.account-form{grid-template-columns:1fr}.entry{grid-template-columns:1fr}.entry-actions{justify-content:space-between}.grid2{grid-template-columns:1fr}}@media(max-width:520px){.app{padding-left:10px;padding-right:10px}.today{grid-template-columns:1fr 1fr}.today .mini:last-child{grid-column:1/-1}.preview{grid-template-columns:1fr 1fr}.filters{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.table th,.table td{font-size:12px;padding:8px 5px}}
      .tabs{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#fbf8f0 0%,rgba(251,248,240,.96) 100%);padding:8px 0 12px;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.workspace{display:block}.composer{display:none;position:static;max-width:760px;margin:0 auto}.composer.active{display:block}.screen.hidden{display:none}.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}.badge{font-size:12px;padding:3px 7px;border-radius:999px;border:1px solid var(--line);background:#fff}.badge.aa{border-color:#caa44b;color:#765100;background:#fff6d9}.badge.reimburse{border-color:#5f9fce;color:#195b88;background:#e4f3ff}.smallbtn.active{background:var(--soft);border-color:rgba(23,107,93,.48);color:#0d4d43;font-weight:700}.chart{margin:10px 0;border:1px solid var(--line);border-radius:8px;background:var(--paper2);padding:10px;overflow:hidden}.chart svg{width:100%;height:auto;display:block}.legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:12px}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}.debt-form{display:grid;grid-template-columns:1fr 120px auto;gap:8px;margin:10px 0 14px}.debt-card{border-left:4px solid var(--accent2)}.debt-card.iOwe{border-left-color:var(--warn)}.debt-card.closed{opacity:.62}.debt-card.closed .entry-main b{text-decoration:line-through}@media(max-width:860px){.debt-form{grid-template-columns:1fr}}  </style>

<body>
  <main class="app">
    <header class="top">
      <div class="brand"><h1>快记账</h1><p>本地保存，账户可配，支持转账、欠款、标注和 CSV 导出。</p></div>
      <div class="today"><div class="mini"><span>今日收入</span><b id="todayIncome">0.00</b></div><div class="mini"><span>今日支出</span><b id="todayExpense">0.00</b></div><div class="mini"><span>本月净额</span><b id="monthNet">0.00</b></div></div>
    </header>
    <nav class="tabs" aria-label="功能视图"><button class="tab active" data-tab="add">记账</button><button class="tab" data-tab="records">明细</button><button class="tab" data-tab="stats">统计</button><button class="tab" data-tab="accounts">账户</button><button class="tab" data-tab="debts">欠款</button></nav>
    <div class="workspace">
      <section class="panel composer active" aria-label="快速记账">
        <h2>一句话记账</h2>
        <form class="form" id="entryForm">
          <textarea id="rawInput" autocomplete="off" inputmode="text" placeholder="微信支出7.11午餐武汉小炒17元&#10;微信转入建行2013 19元"></textarea>
          <div class="examples"><button class="chip" type="button" data-example="微信支出7.11午餐武汉小炒17元">午餐样例</button><button class="chip" type="button" data-example="微信转入建行2013 19元">账户往来</button><button class="chip" type="button" data-example="支付宝昨天打车23.5">昨天打车</button><button class="chip" type="button" data-example="工资3200">工资收入</button></div>
          <div class="preview" id="preview"></div>
          <div class="chips" id="quickAccounts"></div>
          <div class="chips" id="quickCategories"></div>
          <button class="save" type="submit">保存这一笔</button>
          <div class="status" id="status">输入后会实时解析。</div>
        </form>
      </section>
      <section class="screen hidden">
        <section class="panel screen-panel active" id="recordsPanel">
          <h2>账目明细</h2>
          <div class="filters"><select id="recordAccount"></select><select id="recordKind"><option value="all">全部类型</option><option value="expense">支出</option><option value="income">收入</option><option value="transfer">账户往来</option></select><input id="recordSearch" placeholder="搜索备注/分类"><button class="secondary" id="exportCsv" type="button">导出 CSV</button></div>
          <div class="list" id="entryList"></div>
        </section>
        <section class="panel screen-panel" id="statsPanel">
          <h2>收支统计</h2>
          <div class="filters"><select id="periodType"><option value="day">每日</option><option value="week">每周</option><option value="month" selected>每月</option><option value="year">每年</option></select><input id="periodAnchor" type="date"><select id="statsAccount"></select><button class="secondary" id="todayBtn" type="button">回到今天</button></div>
          <div class="status" id="periodLabel"></div>
          <div class="summary"><div class="sum"><span>收入</span><b class="income" id="sumIncome">0.00</b></div><div class="sum"><span>支出</span><b class="expense" id="sumExpense">0.00</b></div><div class="sum"><span>净收入</span><b id="sumNet">0.00</b></div><div class="sum"><span>账户往来</span><b class="transfer" id="sumTransfer">0.00</b></div></div>
          <div class="chart"><div class="legend"><span><i class="dot" style="background:#176b5d"></i>收入</span><span><i class="dot" style="background:#a23a36"></i>支出</span><span><i class="dot" style="background:#2f6f9f"></i>净额</span></div><div id="trendChart"></div></div>
          <div id="statsTable"></div>
        </section>
        <section class="panel screen-panel" id="accountsPanel">
          <h2>资产账户</h2>
          <div class="account-form"><input id="newAccountName" placeholder="例如：建行2013"><select id="newAccountType"><option value="钱包">钱包</option><option value="银行卡">银行卡</option><option value="现金">现金</option><option value="其他">其他</option></select><button class="primary" id="addAccount" type="button">添加账户</button></div>
          <div class="account-grid" id="accountList"></div>
        </section>
        <section class="panel screen-panel" id="debtsPanel">
          <h2>欠款与被欠款</h2>
          <div class="debt-form"><input id="debtInput" placeholder="欠张三100元；李四9.21从我这借200元"><select id="debtDirection"><option value="auto">自动识别</option><option value="iOwe">我欠别人</option><option value="owedToMe">别人欠我</option></select><button class="primary" id="addDebt" type="button">记录</button></div>
          <div class="status" id="debtStatus">欠款不关联资产账户，只记录人、金额、日期和备注。</div>
          <div class="list" id="debtList"></div>
        </section>
      </section>
    </div>
  </main>

  <dialog id="editDialog">
    <form method="dialog" class="dialog-body" id="editForm">
      <div class="dialog-head"><h3>修改这一笔</h3><button class="iconbtn" value="cancel" type="submit">×</button></div>
      <input type="hidden" id="editId">
      <div class="grid2"><label>类型<select id="editKind"><option value="expense">支出</option><option value="income">收入</option><option value="transfer">账户往来</option></select></label><label>金额<input id="editAmount" type="number" min="0" step="0.01"></label><label>日期<input id="editDate" type="date"></label><label>时间<input id="editTime" type="time"></label></div>
      <div class="grid2 edit-normal" id="editNormal"><label>账户<select id="editAccount"></select></label><label>分类<select id="editCategory"></select></label></div>
      <div class="grid2 edit-transfer" id="editTransfer"><label>转出账户<select id="editFrom"></select></label><label>转入账户<select id="editTo"></select></label></div>
      <label>备注<input id="editNote"></label>
      <div class="footer-actions"><button class="secondary" value="cancel" type="submit">取消</button><button class="primary" id="saveEdit" value="default" type="button">保存修改</button></div>
    </form>
  </dialog>

  <script>
    const STORE_KEY="quick-ledger-v2";
    const OLD_KEY="quick-ledger-sample-v1";
    const defaultAccounts=[{id:"wechat",name:"微信",type:"钱包"},{id:"alipay",name:"支付宝",type:"钱包"},{id:"cash",name:"现金",type:"现金"},{id:"ccb2013",name:"建行2013",type:"银行卡"}];
    const categories=["餐饮","交通","日用","购物","学习","医疗","娱乐","收入","账户往来","其他"];
    const tagLabels={aa:"待AA",reimburse:"待报销"};
    const categoryRules=[["收入",/工资|奖金|报销|退款|兼职|收入|转入工资|收款/],["餐饮",/午餐|午饭|早餐|早饭|晚餐|晚饭|夜宵|饭|餐|外卖|小炒|火锅|面|粉|咖啡|奶茶|水果|饮料|食堂/],["交通",/地铁|公交|打车|滴滴|出租|高铁|火车|机票|停车|加油|骑行|共享单车/],["日用",/纸|洗衣|牙膏|牙刷|洗发|沐浴|日用|快递|话费|水费|电费|燃气/],["购物",/淘宝|京东|拼多多|购物|衣服|鞋|数码|超市|便利店/],["学习",/书|课程|文具|打印|论文|学费|考试|资料/],["医疗",/医院|药|挂号|体检|牙|诊所/],["娱乐",/电影|游戏|会员|演出|旅游|唱歌|健身/]];
    const $=id=>document.getElementById(id);
    const els={rawInput:$("rawInput"),preview:$("preview"),status:$("status"),entryForm:$("entryForm"),quickAccounts:$("quickAccounts"),quickCategories:$("quickCategories"),entryList:$("entryList"),recordAccount:$("recordAccount"),recordKind:$("recordKind"),recordSearch:$("recordSearch"),exportCsv:$("exportCsv"),periodType:$("periodType"),periodAnchor:$("periodAnchor"),statsAccount:$("statsAccount"),todayBtn:$("todayBtn"),periodLabel:$("periodLabel"),sumIncome:$("sumIncome"),sumExpense:$("sumExpense"),sumNet:$("sumNet"),sumTransfer:$("sumTransfer"),trendChart:$("trendChart"),statsTable:$("statsTable"),newAccountName:$("newAccountName"),newAccountType:$("newAccountType"),addAccount:$("addAccount"),accountList:$("accountList"),debtInput:$("debtInput"),debtDirection:$("debtDirection"),addDebt:$("addDebt"),debtStatus:$("debtStatus"),debtList:$("debtList"),todayIncome:$("todayIncome"),todayExpense:$("todayExpense"),monthNet:$("monthNet"),editDialog:$("editDialog"),editId:$("editId"),editKind:$("editKind"),editAmount:$("editAmount"),editDate:$("editDate"),editTime:$("editTime"),editAccount:$("editAccount"),editCategory:$("editCategory"),editFrom:$("editFrom"),editTo:$("editTo"),editNote:$("editNote"),editNormal:$("editNormal"),editTransfer:$("editTransfer"),saveEdit:$("saveEdit")};
    let state=loadState();let manualAccount="";let manualCategory="";
    function uid(prefix="id"){return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`}
    function loadState(){try{const saved=JSON.parse(localStorage.getItem(STORE_KEY)||"null");if(saved&&saved.accounts&&saved.entries){saved.debts=saved.debts||[];saved.entries=saved.entries.map(e=>({...e,tags:e.tags||[]}));return saved}}catch{}const accounts=[...defaultAccounts];let entries=[];try{const old=JSON.parse(localStorage.getItem(OLD_KEY)||"[]");entries=old.map(item=>{const account=findAccountByName(accounts,item.account)||accounts[0];return{id:item.id||uid("old"),kind:item.type==="收入"?"income":"expense",amount:Number(item.amount)||0,date:item.date,time:item.time||"00:00",accountId:account.id,category:item.category||"其他",note:item.note||item.raw||"",raw:item.raw||"",tags:[],createdAt:Date.now()}})}catch{}return{accounts,entries,debts:[]}}
    function saveState(){localStorage.setItem(STORE_KEY,JSON.stringify(state))}
    function pad(n){return String(n).padStart(2,"0")}function today(){return formatDate(new Date())}function nowTime(){const d=new Date();return `${pad(d.getHours())}:${pad(d.getMinutes())}`}function formatDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x}function money(n){return (Number(n)||0).toFixed(2)}function esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
    function norm(s){return String(s||"").toLowerCase().replace(/\s+/g,"")}function accountName(id){return state.accounts.find(a=>a.id===id)?.name||"未设账户"}function findAccountByName(accounts,name){const n=norm(name);return accounts.find(a=>norm(a.name)===n)||accounts.find(a=>n.includes(norm(a.name)))}
    function findAccountMentions(text){const normalized=norm(text);const hits=[];state.accounts.forEach(a=>{const key=norm(a.name);let index=normalized.indexOf(key);if(index>=0)hits.push({account:a,index});});return hits.sort((a,b)=>a.index-b.index)}
    function parseDate(text){const now=new Date();let m=text.match(/(20\d{2})[./年-](\d{1,2})[./月-](\d{1,2})日?/);if(m)return{date:`${m[1]}-${pad(m[2])}-${pad(m[3])}`,token:m[0]};m=text.match(/(^|[^\d])(\d{1,2})([./月])(\d{1,2})日?/);if(m){const month=Number(m[2]),day=Number(m[4]);if(month>=1&&month<=12&&day>=1&&day<=31){const token=`${m[2]}${m[3]}${m[4]}${m[3]==="月"?"日":""}`;return{date:`${now.getFullYear()}-${pad(month)}-${pad(day)}`,token}}}if(/前天/.test(text))return{date:formatDate(addDays(now,-2)),token:"前天"};if(/昨天/.test(text))return{date:formatDate(addDays(now,-1)),token:"昨天"};if(/今天/.test(text))return{date:formatDate(now),token:"今天"};return{date:today(),token:""}}
    function parseAmount(text){const dateInfo=parseDate(text);const clean=dateInfo.token?text.replace(dateInfo.token," "):text;const explicit=[...clean.matchAll(/(?:￥|¥)?\s*(\d+(?:\.\d{1,2})?)\s*(?:元|块|rmb|RMB)/g)];if(explicit.length){const last=explicit.at(-1);return{amount:Number(last[1]),token:last[0]}}const nums=[...clean.matchAll(/\d+(?:\.\d{1,2})?/g)].filter(x=>{const i=x.index||0,prev=clean[i-1]||"",next=clean[i+x[0].length]||"";return !/[./月年日-]/.test(prev)&&!/[./月年日-]/.test(next)});if(!nums.length)return{amount:0,token:""};const last=nums.at(-1);return{amount:Number(last[0]),token:last[0]}}
    function inferCategory(text){if(manualCategory)return manualCategory;const hit=categoryRules.find(([,r])=>r.test(text));return hit?hit[0]:"其他"}
    function inferKind(text,category){if(/工资|奖金|报销|退款|兼职|收入|收款/.test(text)||category==="收入")return"income";return"expense"}
    function cleanNote(text,parts){let note=text;[parts.dateToken,parts.amountToken,...(parts.accountTokens||[])].forEach(t=>{if(t)note=note.replace(t," ")});note=note.replace(/支出|消费|花了|付了|付款|收入|收款|转入|转到|转给|转账|提现|充值|从|到|至/g," ").replace(/元|块|￥|¥/g," ").replace(/\s+/g," ").trim();return note}
    function parseEntry(raw){const text=raw.trim();const datePart=parseDate(text);const amountPart=parseAmount(text);const mentions=findAccountMentions(text);const isTransfer=/(转入|转到|转给|转账|提现|充值)/.test(text)&&mentions.length>=2;const base={id:uid("entry"),date:datePart.date,time:nowTime(),amount:amountPart.amount,raw:text,tags:[],createdAt:Date.now()};if(isTransfer){const from=mentions[0].account,to=mentions[1].account;return{...base,kind:"transfer",fromAccountId:from.id,toAccountId:to.id,category:"账户往来",note:cleanNote(text,{dateToken:datePart.token,amountToken:amountPart.token,accountTokens:mentions.map(x=>x.account.name)})||`${from.name}到${to.name}`}}const account=(manualAccount&&state.accounts.find(a=>a.id===manualAccount))||mentions[0]?.account||state.accounts[0];const category=inferCategory(text);const kind=inferKind(text,category);return{...base,kind,accountId:account.id,category,note:cleanNote(text,{dateToken:datePart.token,amountToken:amountPart.token,accountTokens:mentions.map(x=>x.account.name)})||category}}
    function parseDebt(raw,forced="auto"){const text=raw.trim();const datePart=parseDate(text);const amountPart=parseAmount(text);let kind=forced==="auto"?"owedToMe":forced;if(forced==="auto"&&/(^|我)?欠|我借了|向.*借/.test(text)&&!/从我这借|向我借|借我|我借给|借给/.test(text))kind="iOwe";if(forced==="auto"&&/(从我这借|向我借|借我|我借给|借给)/.test(text))kind="owedToMe";let person=text.replace(datePart.token," ").replace(amountPart.token," ").replace(/元|块|欠|我|这|从|向|借了|借|给|还款|待还/g," ").replace(/\s+/g," ").trim();person=person||"未命名";return{id:uid("debt"),kind,person,amount:amountPart.amount,date:datePart.date,note:text,status:"open",createdAt:Date.now()}}
    function entryLine(e){if(e.kind==="transfer")return `${accountName(e.fromAccountId)} → ${accountName(e.toAccountId)} · 账户往来`;return `${accountName(e.accountId)} · ${e.category}`}
    function renderPreview(){const e=parseEntry(els.rawInput.value);const type=e.kind==="transfer"?"账户往来":e.kind==="income"?"收入":"支出";const account=e.kind==="transfer"?`${accountName(e.fromAccountId)} → ${accountName(e.toAccountId)}`:accountName(e.accountId);els.preview.innerHTML=[["类型",type],["金额",e.amount?money(e.amount):"未识别"],["账户",account],["日期",e.date]].map(([a,b])=>`<div class="pitem"><span>${a}</span><b>${esc(b)}</b></div>`).join("");els.status.className=`status${e.amount?" good":" bad"}`;els.status.textContent=e.amount?`将记录：${type} / ${account} / ${e.note}`:"还没有识别到金额。";renderQuickChips(e)}
    function renderQuickChips(e){els.quickAccounts.innerHTML=state.accounts.map(a=>`<button class="chip ${a.id===(manualAccount||e.accountId)?"active":""}" type="button" data-account="${a.id}">${esc(a.name)}</button>`).join("");els.quickCategories.innerHTML=categories.filter(c=>c!=="账户往来").map(c=>`<button class="chip ${c===(manualCategory||e.category)?"active":""}" type="button" data-category="${esc(c)}">${esc(c)}</button>`).join("")}
    function renderSelectOptions(select,includeAll=false){select.innerHTML=(includeAll?`<option value="all">全部账户</option>`:"")+state.accounts.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join("")}
    function tagBadges(e){return (e.tags||[]).map(t=>`<span class="badge ${t}">${tagLabels[t]}</span>`).join("")}
    function renderRecords(){const selected=els.recordAccount.value||"all";renderSelectOptions(els.recordAccount,true);els.recordAccount.value=(selected==="all"||state.accounts.some(a=>a.id===selected))?selected:"all";const account=els.recordAccount.value,kind=els.recordKind.value,q=norm(els.recordSearch.value);let rows=[...state.entries].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));rows=rows.filter(e=>account==="all"||e.accountId===account||e.fromAccountId===account||e.toAccountId===account).filter(e=>kind==="all"||e.kind===kind).filter(e=>!q||norm(e.note+e.category+entryLine(e)+(e.tags||[]).map(t=>tagLabels[t]).join("")+e.raw).includes(q));els.entryList.innerHTML=rows.length?rows.map(e=>`<article class="entry"><div class="entry-main"><b>${esc(e.note||e.category)}</b><span>${e.date} ${e.time} · ${esc(entryLine(e))}</span><div class="badges">${tagBadges(e)}</div></div><div class="entry-actions"><div class="amount ${e.kind}">${e.kind==="income"?"+":e.kind==="expense"?"-":"↔"}${money(e.amount)}</div><button class="smallbtn ${(e.tags||[]).includes("aa")?"active":""}" data-tag="aa" data-id="${e.id}">待AA</button><button class="smallbtn ${(e.tags||[]).includes("reimburse")?"active":""}" data-tag="reimburse" data-id="${e.id}">待报销</button><button class="iconbtn" data-edit="${e.id}" title="修改">改</button><button class="iconbtn danger" data-delete="${e.id}" title="删除">删</button></div></article>`).join(""):`<div class="empty">没有符合条件的账目。</div>`}    function periodRange(type,anchor){const d=new Date(`${anchor}T00:00:00`);let start,end,label;if(type==="day"){start=end=formatDate(d);label=start}else if(type==="week"){const day=(d.getDay()+6)%7;const s=addDays(d,-day),e=addDays(s,6);start=formatDate(s);end=formatDate(e);label=`${start} 至 ${end}`}else if(type==="year"){start=`${d.getFullYear()}-01-01`;end=`${d.getFullYear()}-12-31`;label=`${d.getFullYear()} 年`}else{start=`${d.getFullYear()}-${pad(d.getMonth()+1)}-01`;end=formatDate(new Date(d.getFullYear(),d.getMonth()+1,0));label=`${d.getFullYear()}-${pad(d.getMonth()+1)}`}return{start,end,label}}
    function calcStats(range,account="all"){const totals={income:0,expense:0,transfer:0,transferIn:0,transferOut:0};const per={};state.accounts.forEach(a=>per[a.id]={name:a.name,income:0,expense:0,transferIn:0,transferOut:0,net:0});state.entries.filter(e=>e.date>=range.start&&e.date<=range.end).forEach(e=>{if(e.kind==="transfer"){if(account==="all"||e.fromAccountId===account||e.toAccountId===account)totals.transfer+=e.amount;if(account!=="all"){if(e.toAccountId===account)totals.transferIn+=e.amount;if(e.fromAccountId===account)totals.transferOut+=e.amount}if(per[e.fromAccountId])per[e.fromAccountId].transferOut+=e.amount;if(per[e.toAccountId])per[e.toAccountId].transferIn+=e.amount;return}if(account!=="all"&&e.accountId!==account)return;totals[e.kind]+=e.amount;if(per[e.accountId])per[e.accountId][e.kind]+=e.amount});Object.values(per).forEach(x=>x.net=x.income-x.expense+x.transferIn-x.transferOut);return{totals,per}}
    function trendRows(range,account="all"){const rows=[];for(let d=new Date(`${range.start}T00:00:00`),end=new Date(`${range.end}T00:00:00`);d<=end;d=addDays(d,1))rows.push({date:formatDate(d),income:0,expense:0,net:0});const byDate=Object.fromEntries(rows.map(r=>[r.date,r]));state.entries.forEach(e=>{const r=byDate[e.date];if(!r||e.kind==="transfer")return;if(account!=="all"&&e.accountId!==account)return;r[e.kind]+=e.amount;r.net=r.income-r.expense});return rows}
    function renderTrend(rows){const w=720,h=230,p=34;const max=Math.max(1,...rows.flatMap(r=>[r.income,r.expense,Math.abs(r.net)]));const x=i=>rows.length===1?w/2:p+i*(w-p*2)/(rows.length-1);const y=v=>h-p-(v/max)*(h-p*2);const points=key=>rows.map((r,i)=>`${x(i)},${y(key==="net"?Math.max(0,r.net):r[key])}`).join(" ");const bars=rows.map((r,i)=>{const bw=Math.max(1,(w-p*2)/Math.max(rows.length,8)*.42);return `<rect x="${x(i)-bw/2}" y="${y(r.expense)}" width="${bw}" height="${h-p-y(r.expense)}" fill="#a23a36" opacity=".16"/>`}).join("");const labels=rows.length<=12?rows.map((r,i)=>`<text x="${x(i)}" y="${h-8}" text-anchor="middle" font-size="10" fill="#736c63">${r.date.slice(5)}</text>`).join(""):"";els.trendChart.innerHTML=`<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="趋势图"><line x1="${p}" y1="${h-p}" x2="${w-p}" y2="${h-p}" stroke="#ded5c5"/><line x1="${p}" y1="${p}" x2="${p}" y2="${h-p}" stroke="#ded5c5"/><text x="${p}" y="18" font-size="11" fill="#736c63">最高 ${money(max)}</text>${bars}<polyline points="${points("income")}" fill="none" stroke="#176b5d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><polyline points="${points("expense")}" fill="none" stroke="#a23a36" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><polyline points="${points("net")}" fill="none" stroke="#2f6f9f" stroke-width="2" stroke-dasharray="5 5"/>${labels}</svg>`}
    function renderStats(){const selected=els.statsAccount.value||"all";renderSelectOptions(els.statsAccount,true);els.statsAccount.value=(selected==="all"||state.accounts.some(a=>a.id===selected))?selected:"all";const range=periodRange(els.periodType.value,els.periodAnchor.value||today());const {totals,per}=calcStats(range,els.statsAccount.value);els.periodLabel.textContent=`统计范围：${range.label}${els.statsAccount.value==="all"?" / 全部账户":" / "+accountName(els.statsAccount.value)}`;els.sumIncome.textContent=money(totals.income);els.sumExpense.textContent=money(totals.expense);els.sumNet.textContent=money(totals.income-totals.expense+totals.transferIn-totals.transferOut);els.sumTransfer.textContent=els.statsAccount.value==="all"?money(totals.transfer):`${money(totals.transferIn)} 入 / ${money(totals.transferOut)} 出`;renderTrend(trendRows(range,els.statsAccount.value));const rows=Object.values(per).map(x=>`<tr><td>${esc(x.name)}</td><td class="income">${money(x.income)}</td><td class="expense">${money(x.expense)}</td><td class="transfer">${money(x.transferIn)}</td><td class="transfer">${money(x.transferOut)}</td><td>${money(x.net)}</td></tr>`).join("");els.statsTable.innerHTML=`<table class="table"><thead><tr><th>账户</th><th>收入</th><th>支出</th><th>转入</th><th>转出</th><th>账户净变动</th></tr></thead><tbody>${rows}</tbody></table>`}    function accountBalance(id){let income=0,expense=0,tin=0,tout=0,transfer=false;state.entries.forEach(e=>{if(e.kind==="transfer"&&(e.fromAccountId===id||e.toAccountId===id)){transfer=true;if(e.fromAccountId===id)tout+=e.amount;if(e.toAccountId===id)tin+=e.amount}else if(e.accountId===id){if(e.kind==="income")income+=e.amount;if(e.kind==="expense")expense+=e.amount}});return{balance:income-expense+tin-tout,transfer}}
    function renderAccounts(){els.accountList.innerHTML=state.accounts.map(a=>{const info=accountBalance(a.id);return`<div class="account-card"><div><b>${esc(a.name)}</b><span>${esc(a.type)} · 余额变动 ${money(info.balance)}${info.transfer?" · 有往来":""}</span></div><button class="iconbtn danger" data-remove-account="${a.id}">删</button></div>`}).join("")}
    function renderDebts(){const open=state.debts.filter(d=>d.status!=="closed").sort((a,b)=>b.date.localeCompare(a.date));const closed=state.debts.filter(d=>d.status==="closed").sort((a,b)=>b.date.localeCompare(a.date));const rows=[...open,...closed];els.debtList.innerHTML=rows.length?rows.map(d=>`<article class="entry debt-card ${d.kind} ${d.status==="closed"?"closed":""}"><div class="entry-main"><b>${d.kind==="iOwe"?"我欠":"欠我"} · ${esc(d.person)} · ${money(d.amount)}</b><span>${d.date} · ${esc(d.note)}</span></div><div class="entry-actions"><button class="smallbtn" data-debt-toggle="${d.id}">${d.status==="closed"?"恢复":"结清"}</button><button class="iconbtn danger" data-debt-delete="${d.id}">删</button></div></article>`).join(""):`<div class="empty">还没有欠款记录。</div>`}    function renderTop(){const day=periodRange("day",today()),month=periodRange("month",today());let d=calcStats(day).totals,m=calcStats(month).totals;els.todayIncome.textContent=money(d.income);els.todayExpense.textContent=money(d.expense);els.monthNet.textContent=money(m.income-m.expense)}
    function renderAll(){renderPreview();renderRecords();renderStats();renderAccounts();renderDebts();renderTop();saveState()}
    function openEdit(id){const e=state.entries.find(x=>x.id===id);if(!e)return;[els.editAccount,els.editFrom,els.editTo].forEach(s=>renderSelectOptions(s));els.editCategory.innerHTML=categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join("");els.editId.value=e.id;els.editKind.value=e.kind;els.editAmount.value=e.amount;els.editDate.value=e.date;els.editTime.value=e.time||"00:00";els.editAccount.value=e.accountId||state.accounts[0].id;els.editCategory.value=e.category||"其他";els.editFrom.value=e.fromAccountId||state.accounts[0].id;els.editTo.value=e.toAccountId||state.accounts[1]?.id||state.accounts[0].id;els.editNote.value=e.note||"";toggleEditKind();els.editDialog.showModal()}
    function toggleEditKind(){const t=els.editKind.value==="transfer";els.editTransfer.classList.toggle("show",t);els.editNormal.classList.toggle("hide",t)}
    function saveEdit(){const e=state.entries.find(x=>x.id===els.editId.value);if(!e)return;const next={...e,kind:els.editKind.value,amount:Number(els.editAmount.value)||0,date:els.editDate.value,time:els.editTime.value,note:els.editNote.value.trim()};if(next.kind==="transfer"){next.fromAccountId=els.editFrom.value;next.toAccountId=els.editTo.value;next.category="账户往来";delete next.accountId}else{next.accountId=els.editAccount.value;next.category=els.editCategory.value;delete next.fromAccountId;delete next.toAccountId}state.entries=state.entries.map(x=>x.id===next.id?next:x);els.editDialog.close();renderAll()}
    function exportCsv(){const head=["日期","时间","类型","金额","账户","转出账户","转入账户","分类","备注","标注","原始输入"];const rows=state.entries.map(e=>[e.date,e.time,e.kind==="income"?"收入":e.kind==="expense"?"支出":"账户往来",money(e.amount),e.kind==="transfer"?"":accountName(e.accountId),e.kind==="transfer"?accountName(e.fromAccountId):"",e.kind==="transfer"?accountName(e.toAccountId):"",e.category,e.note,(e.tags||[]).map(t=>tagLabels[t]).join(";"),e.raw]);const csv=[head,...rows].map(r=>r.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");const blob=new Blob(["\ufeff",csv],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`quick-ledger-${today()}.csv`;a.click();URL.revokeObjectURL(url)}
    function showTab(name){document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.tab===name));document.querySelectorAll(".screen-panel").forEach(p=>p.classList.remove("active"));if(name==="add"){document.querySelector(".composer").classList.add("active");document.querySelector(".screen").classList.add("hidden")}else{document.querySelector(".composer").classList.remove("active");document.querySelector(".screen").classList.remove("hidden");$(`${name}Panel`).classList.add("active")}window.scrollTo({top:0,behavior:"smooth"})}
    function toggleTag(id,tag){state.entries=state.entries.map(e=>{if(e.id!==id)return e;const tags=new Set(e.tags||[]);tags.has(tag)?tags.delete(tag):tags.add(tag);return{...e,tags:[...tags]}});renderAll()}
    function removeAccount(id){const info=accountBalance(id);if(Math.abs(info.balance)>0.0001||info.transfer){alert("无法删除：该账户仍有余额变动或存在账户往来记录。");return}if(state.accounts.length<=1){alert("至少需要保留一个账户。");return}if(!confirm(`确认删除账户“${accountName(id)}”？`))return;if(!confirm("再次确认删除？删除后无法从账户列表恢复。"))return;state.accounts=state.accounts.filter(a=>a.id!==id);renderAll()}
    document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>showTab(b.dataset.tab)));
    els.rawInput.addEventListener("input",()=>{manualAccount="";manualCategory="";renderPreview()});els.entryForm.addEventListener("submit",e=>{e.preventDefault();const entry=parseEntry(els.rawInput.value);if(!entry.amount){els.status.className="status bad";els.status.textContent="需要至少有一个金额。";return}state.entries=[entry,...state.entries];els.rawInput.value="";manualAccount="";manualCategory="";renderAll();els.rawInput.focus()});
    document.addEventListener("click",e=>{const ex=e.target.closest("[data-example]");if(ex){els.rawInput.value=ex.dataset.example;manualAccount="";manualCategory="";renderPreview();els.rawInput.focus()}const ac=e.target.closest("[data-account]");if(ac){manualAccount=ac.dataset.account;renderPreview()}const ca=e.target.closest("[data-category]");if(ca){manualCategory=ca.dataset.category;renderPreview()}const tag=e.target.closest("[data-tag]");if(tag)toggleTag(tag.dataset.id,tag.dataset.tag);const edit=e.target.closest("[data-edit]");if(edit)openEdit(edit.dataset.edit);const del=e.target.closest("[data-delete]");if(del&&confirm("删除这一笔记账？")){state.entries=state.entries.filter(x=>x.id!==del.dataset.delete);renderAll()}const rem=e.target.closest("[data-remove-account]");if(rem)removeAccount(rem.dataset.removeAccount);const debtToggle=e.target.closest("[data-debt-toggle]");if(debtToggle){state.debts=state.debts.map(d=>d.id===debtToggle.dataset.debtToggle?{...d,status:d.status==="closed"?"open":"closed"}:d);renderAll()}const debtDel=e.target.closest("[data-debt-delete]");if(debtDel&&confirm("删除这条欠款记录？")){state.debts=state.debts.filter(d=>d.id!==debtDel.dataset.debtDelete);renderAll()}});
    [els.recordAccount,els.recordKind,els.recordSearch].forEach(x=>x.addEventListener("input",renderRecords));[els.periodType,els.periodAnchor,els.statsAccount].forEach(x=>x.addEventListener("input",renderStats));els.todayBtn.addEventListener("click",()=>{els.periodAnchor.value=today();renderStats()});els.exportCsv.addEventListener("click",exportCsv);els.addAccount.addEventListener("click",()=>{const name=els.newAccountName.value.trim();if(!name)return;if(state.accounts.some(a=>norm(a.name)===norm(name))){alert("这个账户已经存在。 ");return}state.accounts.push({id:uid("acct"),name,type:els.newAccountType.value});els.newAccountName.value="";renderAll()});els.addDebt.addEventListener("click",()=>{const debt=parseDebt(els.debtInput.value,els.debtDirection.value);if(!debt.amount){els.debtStatus.className="status bad";els.debtStatus.textContent="需要至少有一个金额。";return}state.debts=[debt,...state.debts];els.debtInput.value="";els.debtDirection.value="auto";els.debtStatus.className="status good";els.debtStatus.textContent="已记录欠款。";renderAll()});els.editKind.addEventListener("input",toggleEditKind);els.saveEdit.addEventListener("click",saveEdit);
    els.periodAnchor.value=today();renderAll();
    if("serviceWorker" in navigator&&location.protocol!=="file:")navigator.serviceWorker.register("./sw.js").catch(()=>{});
    window.ledgerTest={parseEntry,parseDebt,periodRange,calcStats,trendRows,accountBalance,getState:()=>state,setState:x=>{state={...x,debts:x.debts||[],entries:(x.entries||[]).map(e=>({...e,tags:e.tags||[]}))};renderAll()}};
  </script>
